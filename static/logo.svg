    <ellipse cx="25" cy="6" rx="1.5" ry="2.5" fill="white" opacity="0.9" transform="rotate(30 25 6)"/>
    <ellipse cx="23" cy="7" rx="1.5" ry="2.5" fill="white" opacity="0.9" transform="rotate(-30 23 7)"/>
    <ellipse cx="24" cy="4" rx="1.5" ry="2.5" fill="white" opacity="0.9" transform="rotate(60 24 4)"/>
    <ellipse cx="22" cy="5" rx="1.5" ry="2.5" fill="white" opacity="0.9" transform="rotate(-60 22 5)"/>
