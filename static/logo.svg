<svg viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
  <!-- Wheat Y shape -->
  <!-- Left stem -->
  <path d="M 10 20 Q 8 15 8 10" stroke="white" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- Right stem -->
  <path d="M 22 20 Q 24 15 24 10" stroke="white" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- Center stem -->
  <path d="M 16 20 L 16 5" stroke="white" stroke-width="2" fill="none" stroke-linecap="round"/>
  
  <!-- Left grain head -->
  <g>
    <ellipse cx="6" cy="8" rx="1.5" ry="2.5" fill="white" opacity="0.9"/>
    <ellipse cx="7" cy="6" rx="1.5" ry="2.5" fill="white" opacity="0.9" transform="rotate(-30 7 6)"/>
