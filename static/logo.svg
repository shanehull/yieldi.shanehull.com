    <ellipse cx="8" cy="4" rx="1.5" ry="2.5" fill="white" opacity="0.9" transform="rotate(-60 8 4)"/>
    <ellipse cx="10" cy="5" rx="1.5" ry="2.5" fill="white" opacity="0.9" transform="rotate(60 10 5)"/>
  </g>
  
  <!-- Center grain head -->
  <g>
    <ellipse cx="16" cy="3" rx="1.5" ry="2.5" fill="white"/>
